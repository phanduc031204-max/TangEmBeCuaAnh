<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Duyên 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a0b2e;
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Nền sao lấp lánh bằng CSS */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: transparent;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px #fff, 0 0 20px #ffb3c6; }
        }

        /* Vùng chứa thư */
        .container {
            position: relative;
            z-index: 10;
            width: 320px;
            height: 220px;
        }

        /* Lời nhắc chạm */
        .tap-text {
            position: absolute;
            top: -40px;
            width: 100%;
            text-align: center;
            color: #ffb3c6;
            font-size: 1rem;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Phong bì */
        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: #d15c79;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.4s ease;
        }

        .envelope:hover {
            transform: translateY(-5px);
        }

        /* Nắp trên */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 110px 160px 0 160px;
            border-color: #e5738e transparent transparent transparent;
            z-index: 4;
            transform-origin: top;
            transition: transform 0.6s ease-in-out, z-index 0.6s;
        }

        /* Mặt trước */
        .front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 160px 120px 160px;
            border-color: transparent transparent #c04e6b transparent;
            z-index: 3;
            pointer-events: none;
        }

        /* 2 nếp gấp 2 bên */
        .sides {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 110px 160px 110px 160px;
            border-color: transparent #d15c79 transparent #d15c79;
            z-index: 2;
            pointer-events: none;
        }

        /* Bức thư bên trong */
        .letter {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 300px;
            height: 200px;
            background: #fff;
            z-index: 1;
