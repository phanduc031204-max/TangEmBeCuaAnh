
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 90%;
            width: 400px;
            z-index: 10;
        }

        h1 {
            color: #ff4757;
            font-size: 2.5em;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        p {
            color: #57606f;
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        button:hover {
            background-color: #ff6b81;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(2px);
        }

        /* Hiệu ứng nảy nhẹ cho tiêu đề */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
            60% {transform: translateY(-7px);}
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 Happy Birthday! 🎉</h1>
        <p>Chúc bạn một tuổi mới ngập tràn niềm vui, sức khỏe và luôn thành công trong mọi dự định sắp tới nhé!</p>
        <button id="celebrateBtn">Bấm vào đây để nhận quà!</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        document.getElementById('celebrateBtn').addEventListener('click', function() {
            // Cài đặt thời gian bắn pháo giấy (3 giây)
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                
                // Bắn pháo giấy từ nhiều vị trí ngẫu nhiên
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    origin: { x: Math.random(), y: Math.random() - 0.2 }
                }));
            }, 250);
        });
    </script>
</body>
</html>
