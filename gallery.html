<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Lane 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Nền gradient rực rỡ và chuyển động ngầm */
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #a18cd1, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #fff;
            font-size: 3rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            margin-bottom: 40px;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        /* Thư viện ảnh lơ lửng */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 900px;
            perspective: 1000px;
        }

        .polaroid {
            background: #fff;
            padding: 10px 10px 25px 10px;
            border-radius: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transform: rotate(-5deg);
            transition: all 0.4s ease;
            cursor: pointer;
            width: 200px;
            animation: float 4s infinite ease-in-out alternate;
        }

        .polaroid:nth-child(even) {
            transform: rotate(7deg);
            animation-delay: 1s;
        }

        .polaroid:nth-child(3n) {
            transform: rotate(-3deg);
            animation-delay: 2s;
        }

        .polaroid:hover {
            transform: scale(1.1) rotate(0deg) !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .polaroid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 3px;
        }

        .polaroid p {
            text-align: center;
            color: #d15c79;
            margin-top: 10px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .next-btn {
            margin-top: 50px;
            padding: 15px 40px;
            background: #fff;
            color: #d15c79;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease-out 1s both;
        }

        .next-btn:hover {
            background: #d15c79;
            color: #fff;
            transform: translateY(-5px);
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(var(--rot)); }
            100% { transform: translateY(-15px) rotate(var(--rot)); }
        }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h1>Những khoảnh khắc tuyệt vời...</h1>

    <div class="gallery">
        <div class="polaroid" style="--rot: -5deg;">
            <img src="thefirst.jpg" alt="Kỷ niệm 1">
            <p>Ngày đáng nhớ</p>
                        <p>Lần đầu được chụp hình và bế em </p>

        </div>
        <div class="polaroid" style="--rot: 7deg;">
            <img src="nucuoi.jpg" alt="Kỷ niệm 2">
            <p>Nụ cười ấy</p>
        </div>
        <div class="polaroid" style="--rot: -3deg;">
            <img src="dalat.jpg" alt="Kỷ niệm 3">
            <p>Bình yên</p>
        </div>
    </div>

    <a href="fireworks.html" class="next-btn">Chạm vào đây để xem điều bất ngờ 🎇</a>
<audio id="bg-music" loop>
        <source src="nhac.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Logic phát nhạc xuyên suốt các trang
        const music = document.getElementById('bg-music');
        
        // 1. Kiểm tra xem trang trước đó nhạc đang phát tới giây thứ mấy
        const savedTime = sessionStorage.getItem('musicTime');
        if (savedTime) {
            music.currentTime = savedTime; // Tua đến đúng giây đó
        }

        // 2. Thử phát nhạc ngay lập tức
        music.play().catch(() => {
            // Nếu trình duyệt chặn (do chưa click ở trang đầu), thì đợi Duyên chạm vào màn hình sẽ phát
            window.addEventListener('click', () => {
                music.play();
            }, { once: true });
        });

        // 3. Trước khi Duyên bấm chuyển sang trang khác, lưu lại số giây bài hát đang phát
        window.addEventListener('beforeunload', () => {
            sessionStorage.setItem('musicTime', music.currentTime);
        });
    </script>
</body>
</html>
